services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_TIMEZONE: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data

  airflow:
    image: apache/airflow:2.8.1
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname a --lastname a --role Admin --email a@a.com &&
      airflow webserver & airflow scheduler
      "

  spark-master:
    image: apache/spark:3.5.0
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080"   # Master UI
      - "7077:7077"   # Spark cluster communication
    environment:
      SPARK_LOCAL_DIRS: /opt/spark/data
      SPARK_HISTORY_FS_LOG_DIRECTORY: file:///opt/spark/work-dir/spark-events
      SPARK_EVENT_LOG_ENABLED: "true"
      SPARK_EVENT_LOG_DIR: file:///opt/spark/work-dir/spark-events
    volumes:
      - spark-events:/opt/spark/work-dir/spark-events

  spark-worker:
    image: apache/spark:3.5.0
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_LOCAL_DIRS: /opt/spark/data
      SPARK_HISTORY_FS_LOG_DIRECTORY: file:///opt/spark/work-dir/spark-events
      SPARK_EVENT_LOG_ENABLED: "true"
    volumes:
      - spark-events:/opt/spark/work-dir/spark-events

  spark-driver:
    image: apache/spark:3.5.0
    user: root
    command: tail -f /dev/null
    depends_on:
      - spark-master
      - spark-worker
    ports:
      - "4040:4040"
    volumes:
      - ./pyspark:/opt/spark/scripts   # Your PySpark scripts
      - spark-events:/opt/spark/work-dir/spark-events  # Logs/events in named volume

  spark-history-server:
    image: apache/spark:3.5.0
    user: root
    command: >
      /opt/spark/bin/spark-class
      -Dspark.history.fs.logDirectory=file:///opt/spark/work-dir/spark-events
      org.apache.spark.deploy.history.HistoryServer
    ports:
      - "18080:18080"
    depends_on:
      - spark-master
    environment:
      SPARK_HISTORY_FS_LOG_DIRECTORY: file:///opt/spark/work-dir/spark-events
    volumes:
      - spark-events:/opt/spark/work-dir/spark-events  # Read logs from named volume

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker/minio/data:/data

volumes:
  spark-events: